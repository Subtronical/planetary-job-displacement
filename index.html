  function project(lat,lng,rotY,rotX,R){
    const phi=(90-lat)*Math.PI/180,theta=(lng+180)*Math.PI/180;
    let x=Math.sin(phi)*Math.cos(theta),y=Math.cos(phi),z=Math.sin(phi)*Math.sin(theta);
    const cy=Math.cos(rotY),sy=Math.sin(rotY);[x,z]=[x*cy-z*sy,x*sy+z*cy];
    const cx2=Math.cos(rotX),sx=Math.sin(rotX);[y,z]=[y*cx2-z*sx,y*sx+z*cx2];
    return{sx:x*R,sy:-y*R,z,vis:z>-0.05};
  }

        const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=Math.min(W,H)*0.40;

        STARS.forEach(s=>{ctx.fillStyle=`rgba(180,210,255,${s.a})`;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();});

  function NationImpact(){

            <div key={l} style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:9,padding:'8px 14px',textAlign:'center',boxShadow:'0 1px 6px rgba(0,0,0,0.05)'}}>

            <div style={{flex:1}}>

              <div style={{fontSize:10,fontWeight:700,color:nation.tagC,marginBottom:5}}>{nation.tag}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{nation.wildcards.map(w=><span key={w} style={{background:`${nation.tagC}10`,color:nation.tagC,border:`1px solid ${nation.tagC}30`,padding:'1px 7px',borderRadius:9,fontSize:9,fontWeight:700}}>{w}</span>)}</div>

          </div>

            {nation.metrics.map(m=><div key={m.l} style={{padding:'8px 6px',textAlign:'center',borderRight:'1px solid #f0f4f8'}}>
              <div style={{fontSize:12,fontWeight:700,color:m.c,marginBottom:1}}>{m.v}</div>
              <div style={{fontSize:7,fontWeight:600,letterSpacing:'0.8px',textTransform:'uppercase',color:C.muted,marginBottom:3}}>{m.l}</div>
              <div style={{height:3,background:'#edf2f7',borderRadius:2}}><div style={{height:'100%',width:`${m.b}%`,background:m.c,opacity:0.7,borderRadius:2}}/></div>

        </div>)}
        <div style={{background:'#1a2340',borderRadius:12,padding:'20px 24px',marginTop:6,color:'#c8d8f0'}}>

        </div>
      </div>
    </div>;
  }

              {r.shocks.map((s,i)=>{const isPos=s.impact>=0;return(
                <div key={i} style={{display:'flex',gap:10,marginBottom:7,paddingBottom:7,borderBottom:'1px solid #f0f4f8'}}>
                  <div style={{flexShrink:0,width:66}}><div style={{fontSize:8,fontWeight:700,color:r.col}}>{s.yr}</div><div style={{fontSize:14,fontWeight:700,color:isPos?'#38a169':'#e53e3e',lineHeight:1}}>{isPos?'+':''}{s.impact}%</div><div style={{fontSize:8,color:C.muted}}>{s.jobs}M jobs</div></div>
                  <div style={{flex:1}}><div style={{fontSize:10,fontWeight:600,color:C.text,marginBottom:1}}>{s.label}</div><div style={{fontSize:10,color:C.dim,lineHeight:1.6}}>{s.desc}</div></div>
                </div>);})}
            </div>
            <div style={{padding:'0 16px 10px'}}>
              <div style={{fontSize:8,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:C.muted,marginBottom:5}}>Country Exposures</div>
              {r.countries.map(ct=><div key={ct.n} style={{display:'flex',gap:8,alignItems:'center',padding:'4px 0',borderTop:'1px solid #f0f4f8'}}>
                <span style={{fontSize:16}}>{ct.f}</span>
                <div style={{flex:1}}><span style={{fontSize:11,fontWeight:600,color:C.text}}>{ct.n}</span><span style={{fontSize:9,color:C.dim,marginLeft:8}}>→ {ct.at} at risk · recovery {ct.rec}</span></div>
                <span style={{fontSize:11,fontWeight:700,color:ct.hit<0?'#e53e3e':'#38a169'}}>{ct.hit<0?'':'+'}${ct.hit}%</span>
              </div>)}
            </div>
          </div>)}
        </div>
        <div style={{background:'#1a2340',borderRadius:12,padding:'20px 24px',marginTop:14,color:'#c8d8f0'}}>
          <div style={{fontFamily:'Georgia,serif',fontSize:16,color:'#fff',marginBottom:8}}>The $15 Trillion Redistribution</div>
          <div style={{fontSize:11,lineHeight:1.85}}>By 2034, AI will have generated an estimated <strong style={{color:'#fff'}}>$15–20 trillion in cumulative global productivity gains</strong>. Under current trajectories, 78% flows to the top 10% of earners. <strong style={{color:'#fff'}}>South Asia and Africa face net GDP contraction despite the global surge</strong> — made poorer by a technology that makes the world richer in aggregate. This is a policy choice.</div>
        </div>
      </div>
    </div>;
  }

  const CONFLICTS=[
    {sev:"Critical",col:"#ff1a33",icon:"☢️",title:"AI Arms Race & Autonomous Weapons",sub:"US · China · Russia",prob:"Very High (85%)",overview:"The race to develop autonomous lethal weapons systems is accelerating faster than any governance framework. AI-enabled military systems make kill decisions in milliseconds. Russia's use of AI-guided drones in Ukraine is a live experiment in autonomous battlefield AI.",flashpoints:["Taiwan Strait: hair-trigger miscalculation risk as response times compress below human speed","Autonomous drone swarms deployable by non-state actors democratise lethal force","Cyber-physical attacks on critical infrastructure indistinguishable from acts of war","Nuclear command: AI integration into early warning creates dangerous false-positive risk"],mitigation:"International AI weapons convention. US-China AI military hotline. Meaningful human control requirements in weapons procurement."},
    {sev:"Critical",col:"#ff1a33",icon:"🌊",title:"Climate Migration & Resource War Cascade",sub:"Sahel · South Asia · Central America",prob:"High (78%)",overview:"AI-driven agricultural automation collides with climate-driven agricultural failure to produce a migration wave without historical precedent. The World Bank projects 216 million internal climate migrants by 2050. AI job displacement removes the urban employment that historically absorbed rural migrants.",flashpoints:["Sahel: Lake Chad disappearing — 50M people, weak states, no urban jobs","Bangladesh: 30–40M coastal displacement by 2050","India-Pakistan water wars: Indus Water Treaty under strain, both nuclear-armed","Horn of Africa: Ethiopia, Somalia, Sudan — fragile states sharing a warming, drying geography"],mitigation:"Climate adaptation finance. Managed migration pathways. AI-driven early warning systems for conflict prediction."},
    {sev:"Critical",col:"#ff1a33",icon:"🤖",title:"AI Disinformation & Democratic Collapse",sub:"Global · Every Electoral Democracy",prob:"Very High (90%+ already occurring)",overview:"Synthetic media is already deployed in elections globally. The 2024 cycle saw AI disinformation at unprecedented scale. When people cannot distinguish real from fabricated reality, authoritarian simplicity becomes appealing.",flashpoints:["Election manipulation: AI-generated voter suppression deployed faster than fact-checkers can respond","Economic anxiety weaponised toward ethnonationalism via AI-targeted content","Synthetic atrocity propaganda: AI-generated footage to justify military action","Leadership impersonation: voice clones of presidents giving false orders"],mitigation:"Content provenance standards (C2PA). Platform AI transparency. Media literacy from primary school age."},
    {sev:"High",col:"#ff6600",icon:"⚡",title:"AI Economic Warfare & Decoupling",sub:"US · China · EU",prob:"High (75%)",overview:"US export controls on semiconductors represent the opening move in an AI technology war. China is creating parallel AI ecosystems. For 150+ developing nations caught between, the cost of choosing sides is rising.",flashpoints:["Chip war: Taiwan TSMC is the world's most strategically critical factory","AI colonialism backlash: nations recognising AI extracts value without local benefit","Undersea cable sabotage: 97% of internet traffic is vulnerable","Sanctions cascades: AI-powered financial warfare grows faster and more targeted"],mitigation:"Multilateral AI governance (UN, OECD). Open-source AI as global public good. Technology transfer in trade agreements."},
    {sev:"High",col:"#ff6600",icon:"🏚️",title:"Domestic Political Violence from Displacement",sub:"US · India · Brazil · Nigeria",prob:"Moderate-High (65%)",overview:"Mass unemployment historically precedes political violence. AI displacement is structural, rapid, and concentrated among demographics with the highest propensity for radicalisation. When displacement coincides with identity politics and authoritarian narratives, civil unrest becomes acute.",flashpoints:["US Midwest: concentrated displacement in already-radicalised communities","India: 600M under-25s + unemployment + caste conflict = high-risk combination","Brazil: Bolsonarismo showed the mobilisation pattern — AI displacement amplifies it","West Africa: Youth unemployment + Sahel instability + remittance collapse = state fragility"],mitigation:"Universal basic income pilots. Retraining with income replacement. Community investment in displaced regions."},
  ];

  function GeoTab(){
    const [exp,setExp]=useState(null);
    return <div style={{height:'100%',overflowY:'auto',background:C.bg,padding:'20px',fontFamily:'system-ui,sans-serif'}}>
      <div style={{maxWidth:860,margin:'0 auto'}}>
        <div style={{fontFamily:'Georgia,serif',fontSize:20,color:C.darkText,marginBottom:3}}>Impending Conflict</div>
        <div style={{fontSize:11,color:C.darkMuted,marginBottom:16,lineHeight:1.7}}>AI-driven displacement is not just an economic event — it is a geopolitical trigger. These are the conflict vectors most likely to escalate as displacement accelerates.</div>
        {CONFLICTS.map((cf,i)=><div key={i} style={{background:C.darkCard,borderRadius:12,border:`1px solid ${cf.col}28`,marginBottom:10,overflow:'hidden'}}>
          <div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'14px 16px',cursor:'pointer'}} onClick={()=>setExp(exp===i?null:i)}>
            <div style={{fontSize:26,flexShrink:0}}>{cf.icon}</div>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:2}}>
                <span style={{background:`${cf.col}20`,color:cf.col,border:`1px solid ${cf.col}40`,padding:'1px 7px',borderRadius:9,fontSize:8,fontWeight:700,textTransform:'uppercase'}}>{cf.sev}</span>
                <span style={{fontSize:9,color:C.darkMuted}}>{cf.sub}</span>
              </div>
              <div style={{fontFamily:'Georgia,serif',fontSize:15,color:C.darkText,marginBottom:2}}>{cf.title}</div>
              <div style={{fontSize:10,color:C.darkMuted}}>Probability: <strong style={{color:cf.col}}>{cf.prob}</strong></div>
            </div>
            <div style={{fontSize:12,color:C.darkMuted,transform:exp===i?'rotate(90deg)':'none',transition:'transform 0.2s',flexShrink:0}}>▶</div>
          </div>
          {exp===i&&<div style={{padding:'0 16px 14px',borderTop:`1px solid ${cf.col}18`}}>
            <div style={{fontSize:11,color:C.darkMuted,lineHeight:1.8,marginBottom:12,marginTop:10}}>{cf.overview}</div>
            <div style={{fontSize:8,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:cf.col,marginBottom:7}}>Flash Points</div>
            {cf.flashpoints.map((fp,j)=><div key={j} style={{display:'flex',gap:7,marginBottom:5,fontSize:10,color:'#a0b8cc',lineHeight:1.6}}><span style={{color:cf.col,flexShrink:0}}>⚡</span><span>{fp}</span></div>)}
            <div style={{marginTop:10,padding:'9px 11px',background:`${cf.col}10`,borderRadius:7,borderLeft:`3px solid ${cf.col}`}}>
              <div style={{fontSize:8,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:C.green,marginBottom:3}}>Mitigation</div>
              <div style={{fontSize:10,color:C.darkMuted,lineHeight:1.7}}>{cf.mitigation}</div>
            </div>
          </div>}
        </div>)}
      </div>
    </div>;
  }

  const OPP=[
    {icon:"🤖",title:"AI Trainers & Evaluators",growth:"+340%",timeline:"Now → 2030",salary:"$45K–$95K",desc:"Every AI model requires humans to generate training data, evaluate outputs, and refine responses. This work is rising in complexity — from basic labelling to nuanced cultural and ethical judgment.",skills:["Data Annotation","RLHF","Cultural Evaluation","Domain Expertise"]},
    {icon:"🛡️",title:"AI Governance & Ethics Officers",growth:"+280%",timeline:"2025 → 2035",salary:"$85K–$180K",desc:"Every major organisation deploying AI needs people who audit systems for bias, ensure regulatory compliance (EU AI Act), and communicate AI limitations to boards and regulators.",skills:["AI Policy","Risk Assessment","Regulatory Compliance","Ethics Frameworks"]},
    {icon:"🏥",title:"Human-Centred Care Roles",growth:"+190%",timeline:"Now → 2040",salary:"$38K–$85K",desc:"AI cannot replicate human empathy, physical presence, or trust in healthcare, elder care, and mental health support. As populations age and AI creates social isolation risks, demand surges.",skills:["Emotional Intelligence","Clinical Judgment","Complex Communication","Physical Care"]},
    {icon:"⚙️",title:"Process Automation Architects",growth:"+220%",timeline:"2025 → 2032",salary:"$75K–$145K",desc:"Someone has to design, implement, and manage the AI systems replacing workers. Former back-office managers are natural candidates — they understand what needs doing.",skills:["Workflow Analysis","No-Code AI","Change Management","Business Process"]},
    {icon:"🌿",title:"Climate Transition Workforce",growth:"+410%",timeline:"Now → 2040",salary:"$42K–$120K",desc:"The clean energy transition requires millions: solar installers, wind technicians, battery engineers, EV infrastructure builders, carbon accountants, ecological restoration managers.",skills:["Renewable Energy","Environmental Science","Project Management","Green Finance"]},
    {icon:"🎨",title:"Human Creativity & Craft",growth:"+85%",timeline:"2027 → 2035",salary:"$30K–$250K+",desc:"AI generates competent average-quality content at scale. Premium human creativity — bespoke craft, live performance, unique artistic voice — becomes more valuable as AI floods the market.",skills:["Craft Mastery","Authentic Voice","Community Building","Storytelling"]},
  ];

  function HopeTab(){
    const [sel,setSel]=useState(null);
    return <div style={{height:'100%',overflowY:'auto',background:'#f0f4f8',padding:'20px 22px',fontFamily:'system-ui,sans-serif'}}>
      <div style={{maxWidth:960,margin:'0 auto'}}>
        <div style={{fontFamily:'Georgia,serif',fontSize:20,color:C.text,marginBottom:3}}>🌱 The Opportunity Ahead</div>
        <div style={{fontSize:11,color:C.dim,marginBottom:18,lineHeight:1.8}}>AI workforce disruption is real and severe — but not the whole story. Every major technological transition has created more work than it destroyed, over time. The question is whether transition support is fast and broad enough to catch displaced workers before they fall through the gap.</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:11,marginBottom:18}}>
          {OPP.map((o,i)=><div key={i} onClick={()=>setSel(sel===i?null:i)} style={{background:'#fff',borderRadius:11,border:`2px solid ${sel===i?C.accent:'#e2e8f0'}`,padding:'14px 16px',cursor:'pointer',transition:'all 0.15s',boxShadow:sel===i?'0 4px 16px rgba(59,110,245,0.15)':'0 1px 6px rgba(20,40,80,0.05)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}}>
              <span style={{fontSize:22}}>{o.icon}</span>
              <span style={{background:'rgba(56,161,105,0.15)',color:C.green,border:'1px solid rgba(56,161,105,0.3)',padding:'2px 8px',borderRadius:9,fontSize:10,fontWeight:700}}>{o.growth}</span>
            </div>
            <div style={{fontFamily:'Georgia,serif',fontSize:14,color:C.text,marginBottom:4}}>{o.title}</div>
            <div style={{fontSize:10,color:C.dim,lineHeight:1.6,marginBottom:sel===i?8:0}}>{o.desc}</div>
            {sel===i&&<>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:9}}>
                <div style={{background:'#f7f9fc',borderRadius:7,padding:'7px 9px'}}><div style={{fontSize:7,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:C.muted,marginBottom:1}}>Timeline</div><div style={{fontSize:10,fontWeight:600,color:C.text}}>{o.timeline}</div></div>
                <div style={{background:'#f7f9fc',borderRadius:7,padding:'7px 9px'}}><div style={{fontSize:7,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:C.muted,marginBottom:1}}>Salary</div><div style={{fontSize:10,fontWeight:600,color:C.green}}>{o.salary}</div></div>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{o.skills.map(s=><span key={s} style={{background:'rgba(59,110,245,0.1)',color:C.accent,border:'1px solid rgba(59,110,245,0.2)',padding:'2px 7px',borderRadius:9,fontSize:9,fontWeight:600}}>{s}</span>)}</div>
            </>}
          </div>)}
        </div>
        <div style={{background:'#1a2340',borderRadius:12,padding:'20px 24px',color:'#c8d8f0'}}>
          <div style={{fontFamily:'Georgia,serif',fontSize:16,color:'#fff',marginBottom:8}}>The Core Bargain</div>
          <div style={{fontSize:11,lineHeight:1.85}}>The AI era does not have to be defined by displacement. It can be defined by the largest expansion of human possibility in history — <strong style={{color:'#fff'}}>if we choose to distribute its benefits broadly rather than concentrate them narrowly.</strong> Every retraining program funded, every safety net expanded, every new industry seeded in a displaced community is a vote for the version of AI transition that humanity can be proud of.</div>
        </div>
      </div>
    </div>;
  }

  function Stat({label,value,color,tip}){
    const [show,setShow]=useState(false);
    return <div style={{position:'relative',textAlign:'center',padding:'0 10px',borderRight:`1px solid ${C.border}`}} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
      <div style={{fontSize:7,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:C.muted,display:'flex',alignItems:'center',gap:3,justifyContent:'center'}}>
        {label}<span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:11,height:11,borderRadius:'50%',background:'rgba(59,110,245,0.15)',color:C.accent,fontSize:8,fontWeight:700,cursor:'help'}}>?</span>
      </div>
      <div style={{fontSize:16,fontWeight:700,color,marginTop:1,letterSpacing:'-0.5px'}}>{value}</div>
      {show&&<div style={{position:'absolute',top:'calc(100% + 8px)',left:'50%',transform:'translateX(-50%)',width:200,background:'#1a2340',color:'#e8f0ff',fontSize:10,lineHeight:1.7,padding:'10px 12px',borderRadius:9,boxShadow:'0 8px 30px rgba(0,0,0,0.4)',zIndex:999,border:'1px solid rgba(59,110,245,0.3)',fontFamily:'system-ui,sans-serif',pointerEvents:'none',textAlign:'left'}}>
        <div style={{position:'absolute',top:-5,left:'50%',transform:'translateX(-50%)',width:0,height:0,borderLeft:'5px solid transparent',borderRight:'5px solid transparent',borderBottom:'5px solid #1a2340'}}/>
        {tip}
      </div>}
    </div>;
  }

  const TABS=[['globe','🌐 Map'],['nation','👥 Nations'],['data','📊 Observatory'],['gdp','📉 GDP'],['geo','⚔️ Conflict'],['hope','🌱 Opportunity']];

  function App(){
    const [year,setYear]=useState(2025);
    const [tab,setTab]=useState('globe');
    const [selId,setSelId]=useState(null);
    const [hovId,setHovId]=useState(null);
    const [playing,setPlaying]=useState(false);
    const playRef=useRef(null);
    const togglePlay=()=>{
      if(playing){clearInterval(playRef.current);setPlaying(false);}
      else{setPlaying(true);let y=year>=2035?2025:year;if(year>=2035)setYear(2025);playRef.current=setInterval(()=>{y+=1;if(y>2035){clearInterval(playRef.current);setPlaying(false);return;}setYear(y);},1200);}
    };
    useEffect(()=>()=>clearInterval(playRef.current),[]);
    const totals=Object.values(REGIONS).reduce((a,r)=>{const yr=r.yearly[year];return{d:a.d+yr.displaced,n:a.n+yr.newRoles,r:a.r+yr.risk,c:a.c+1};},{d:0,n:0,r:0,c:0});
    return <div style={{height:'100vh',display:'flex',flexDirection:'column',background:C.bg,fontFamily:'system-ui,sans-serif',overflow:'hidden'}}>
      <div style={{background:'rgba(255,255,255,0.97)',borderBottom:`1px solid ${C.border}`,padding:'7px 14px',display:'flex',alignItems:'center',gap:10,flexShrink:0,flexWrap:'wrap',boxShadow:'0 2px 12px rgba(20,40,80,0.07)',position:'relative',zIndex:50}}>
        <div style={{flexShrink:0}}>
          <div style={{fontFamily:'Georgia,serif',fontSize:15,color:C.text,fontWeight:700,lineHeight:1.2}}>Earth Workforce Evolution</div>
          <div style={{fontSize:9,color:C.muted}}>Roles at Risk · New Opportunities · 2025–2035</div>
        </div>
        <div style={{display:'flex',gap:0,flexShrink:0}}>
          <Stat label="Roles Disrupted" value={`${totals.d.toFixed(1)}M`} color={C.red} tip={<><strong style={{color:'#fff',display:'block',fontSize:9,marginBottom:3}}>Roles Disrupted</strong>Workers whose job functions are substantially automated or eliminated by AI this year.</>}/>
          <Stat label="New Roles Created" value={`${totals.n.toFixed(1)}M`} color={C.green} tip={<><strong style={{color:'#fff',display:'block',fontSize:9,marginBottom:3}}>New Roles Created</strong>Entirely new job categories emerging because of AI — trainers, governance officers, automation architects.</>}/>
          <Stat label="Transition Gap" value={`−${(totals.d-totals.n).toFixed(1)}M`} color={C.orange} tip={<><strong style={{color:'#fff',display:'block',fontSize:9,marginBottom:3}}>Transition Gap</strong>Net shortfall: New Roles minus Roles Disrupted. Negative = displacement outpacing creation.</>}/>
          <Stat label="Avg Exposure" value={`${Math.round(totals.r/totals.c)}%`} color={C.accent} tip={<><strong style={{color:'#fff',display:'block',fontSize:9,marginBottom:3}}>Avg Automation Exposure</strong>Average share of back-office tasks technically automatable by AI across all 9 regions.</>}/>
        </div>
        <div style={{flex:1,minWidth:220}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
            <span style={{fontSize:9,color:C.muted}}>Year</span>
            <span style={{fontSize:14,fontWeight:700,color:C.accent,letterSpacing:1}}>{year}</span>
            <button onClick={togglePlay} style={{background:playing?C.red:C.accent,color:'#fff',border:'none',padding:'3px 10px',fontSize:10,fontWeight:600,fontFamily:'system-ui,sans-serif',cursor:'pointer',borderRadius:5}}>{playing?'■ Stop':'▶ Play'}</button>
          </div>
          <input type="range" min={2025} max={2035} value={year} onChange={e=>setYear(Number(e.target.value))} style={{width:'100%',cursor:'pointer'}}/>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:7,color:C.muted,marginTop:1}}>
            {[2025,2027,2029,2031,2033,2035].map(y=><span key={y} style={{color:y===year?C.accent:C.muted,fontWeight:y===year?700:400}}>{y}</span>)}
          </div>
        </div>
      </div>
      <div style={{background:'rgba(255,255,255,0.97)',borderBottom:`1px solid ${C.border}`,display:'flex',padding:'0 10px',flexShrink:0,overflowX:'auto',zIndex:40}}>
        {TABS.map(([t,l])=><button key={t} onClick={()=>setTab(t)} style={{background:'transparent',border:'none',borderBottom:`3px solid ${tab===t?C.accent:'transparent'}`,padding:'8px 12px',fontSize:10,fontWeight:600,color:tab===t?C.accent:C.muted,cursor:'pointer',fontFamily:'system-ui,sans-serif',marginBottom:-1,whiteSpace:'nowrap',flexShrink:0,transition:'all 0.15s'}}>{l}</button>)}
      </div>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
        {tab==='globe'&&<div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
          <div style={{width:200,borderRight:`1px solid ${C.border}`,flexShrink:0,overflow:'hidden'}}><LeftPanel year={year}/></div>
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at 50% 40%,#0a1628 0%,#060d1a 70%)',overflow:'hidden',position:'relative',minWidth:0}}>
            <div style={{width:'min(440px,90%)',height:'min(440px,90%)',position:'relative'}}>
              <GlobeCanvas year={year} selId={selId} hovId={hovId} onSelect={setSelId} onHover={setHovId}/>
            </div>
            <div style={{position:'absolute',bottom:10,left:'50%',transform:'translateX(-50%)',background:'rgba(255,255,255,0.07)',backdropFilter:'blur(8px)',padding:'3px 12px',borderRadius:18,fontSize:9,color:'rgba(255,255,255,0.6)',border:'1px solid rgba(255,255,255,0.1)',pointerEvents:'none',whiteSpace:'nowrap'}}>🌍 Drag to rotate · Click a spike to inspect</div>
          </div>
          <div style={{width:235,borderLeft:`1px solid ${C.border}`,flexShrink:0,overflow:'hidden'}}><RightPanel year={year} selId={selId} hovId={hovId}/></div>
        </div>}
        {tab==='nation'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><NationImpact/></div>}
        {tab==='data'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><DataObservatory/></div>}
        {tab==='gdp'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><GdpTab/></div>}
        {tab==='geo'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><GeoTab/></div>}
        {tab==='hope'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><HopeTab/></div>}
      </div>
    </div>;
  }

  const root=ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App/>);
  </script>
</body>
</html>
